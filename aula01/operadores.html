<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Operadores Javascript</title>
</head>

<body>
    <h1>Operadores Javascript</h1>

    <script>
        // operadores artimetiocos adição, substração, multiplicação, divisão, resto da divisão, potenciação

        console.log(10 + 3);
        console.log(10 - 3);
        console.log(10 * 3);
        console.log(10 / 3);
        console.log(10 % 3);
        console.log(2 ** 3);

        // operadores de comparaçãpo -sem retornam true ou false (booleanos)

        console.log(5 > 3)
        console.log(5 < 3)
        console.log(5 >= 5)
        console.log(5 == 5)
        console.log(5 == "5")
        console.log(5 === "5")
        console.log(5 !== 3)
    </script>


</body>

</html>
