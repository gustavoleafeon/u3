<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exemplo If/Else</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div id="meuElemento" class="estado-inicial">Clique Aqui!</div>


    <p id="meuTexto">O estado atual é: Inicial.</p>

    <script src="script.js"></script>

    <div id="mensagem-container">
        <p id="msg-dia" class="mensagem">Bom dia! Aproveite seu dia.</p>
        <p id="msg-noite" class="mensagem">Boa noite! Hora de descansar.</p>
    </div>

    <button id="meuBotao" disabled>Botão de Ação</button>

    <div class="controles">
        <button onclick="ativarBotao()">Habilitar Botão</button>
        <button onclick="desativarBotao()">Desabilitar Botão</button>
    </div>

    <div class="container">
        <h2>Filtrar Produtos</h2>
        <input type="text" id="campoBusca" placeholder="Pesquise pelo nome do produto...">

        <ul id="listaProdutos">
            <li class="produto">Smartphone Samsung</li>
            <li class="produto">Notebook Dell</li>
            <li class="produto">Fone de Ouvido JBL</li>
            <li class="produto">Smartwatch Apple</li>
            <li class="produto">Teclado Mecânico</li>
            <li class="produto">Mouse Gamer</li>
        </ul>
    </div>

</body>

</html>
